name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Format, Compile & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Check formatting
        run: sbt fmtCheck

      - name: Unit tests
        run: sbt test

      - name: Integration tests
        run: sbt integration/test

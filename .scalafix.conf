rules = [
  DisableSyntax,
  NoAutoTupling,
  NoValInForComprehension,
  OrganizeImports
]

OrganizeImports {
  blankLines = Auto
  groups = [
     "re:javax?\\."
     "scala."
     "*"
   ]
  coalesceToWildcardImportThreshold = 5
  expandRelative = true
  groupExplicitlyImportedImplicitsSeparately = false
  groupedImports = Merge
  importSelectorsOrder = Ascii
  importsOrder = Ascii
  removeUnused = true
  targetDialect = Auto
}

DisableSyntax {
  noVars = true
  noThrows = true
  noNulls = true
  noReturns = true
  noWhileLoops = true
  noFinalize = true
  noValPatterns = true
}
